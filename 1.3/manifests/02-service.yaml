apiVersion: v1
kind: Service
metadata:
  name: nginx-multitool-service
  namespace: default
  labels:
    app: nginx-multitool-service
    homework: "1.3"
spec:
  selector:
    app: nginx-multitool
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    name: http-nginx
  - protocol: TCP
    port: 1180
    targetPort: 1180
    name: http-multitool
  type: ClusterIP
