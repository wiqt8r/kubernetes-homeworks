apiVersion: v1
kind: Pod
metadata:
  name: multitool-test-pod
  namespace: default
  labels:
    app: test-pod
    homework: "1.3"
spec:
  containers:
  - name: multitool
    image: wbitt/network-multitool
    command: ["sleep", "infinity"]
    env:
    - name: HTTP_PORT
      value: "1181"
    ports:
    - containerPort: 1181
