apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-init-deployment
  namespace: default
  labels:
    app: nginx-init
    homework: "1.3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-init
  template:
    metadata:
      labels:
        app: nginx-init
    spec:
      initContainers:
      - name: wait-for-service
        image: busybox:latest
        command:
          - sh
          - -c
          - |
            until nslookup nginx-init-service.default.svc.cluster.local >/dev/null 2>&1; do
              echo "Waiting for nginx-init-service to be available..."
              sleep 2
            done
            echo "Service is up! Starting nginx..."
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
