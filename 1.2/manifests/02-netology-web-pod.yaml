apiVersion: v1
kind: Pod
metadata:
  name: netology-web
  namespace: default
  labels:
    app: netology-web
    homework: "1.2"
    task: "service-creation"
spec:
  containers:
  - name: echoserver
    image: gcr.io/kubernetes-e2e-test-images/echoserver:2.2
    ports:
    - containerPort: 8080
      name: http
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
