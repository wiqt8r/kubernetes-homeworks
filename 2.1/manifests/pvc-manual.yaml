apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sc-pvc
  namespace: default
  labels:
    homework: "2.1"
  # Важно: НЕ добавляем аннотации, которые вызывают провижинер
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: fast-local
