---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-local
provisioner: microk8s.io/hostpath
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sc-pvc
  namespace: default
  labels:
    homework: "2.1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: fast-local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-exchange-sc
  namespace: default
  labels:
    app: data-exchange-sc
    homework: "2.1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-exchange-sc
  template:
    metadata:
      labels:
        app: data-exchange-sc
    spec:
      volumes:
      - name: sc-storage
        persistentVolumeClaim:
          claimName: sc-pvc
      containers:
      - name: busybox-writer
        image: busybox:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              echo "Data from busybox at $(date)" >> /data/sc-file.txt
              sleep 5
            done
        volumeMounts:
        - name: sc-storage
          mountPath: /data
      - name: multitool-reader
        image: wbitt/network-multitool
        env:
        - name: HTTP_PORT
          value: "1180"
        ports:
        - containerPort: 1180
        command: ["/bin/sh", "-c"]
        args:
          - |
            tail -f /data/sc-file.txt
        volumeMounts:
        - name: sc-storage
          mountPath: /data
